  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAFAF8; font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', 'Hiragino Sans', sans-serif; color: #333; min-height: 100vh; }
    header { background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.07); padding: 14px 32px; display: flex; align-items: center; }

    .site-title .meguru { color: #C9A0B8; }

    main { max-width: 680px; margin: 36px auto; padding: 0 20px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #C9A0B8; text-decoration: none; margin-bottom: 24px; padding: 6px 14px; border: 1px solid #E8C9D8; border-radius: 20px; background: #fff; transition: background 0.15s; }

    .detail-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .card-top-bar { height: 5px; background: #CCC; }
    .card-inner { padding: 28px 32px; }
    .style-badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-bottom: 14px; letter-spacing: 0.04em; background: #F5F4F0; border: 1px solid #DDD; color: #999; }
    .shelf-title { font-size: 1.6rem; font-weight: 700; color: #222; line-height: 1.3; margin-bottom: 20px; }
    .meta-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; margin-bottom: 24px; }
    .meta-label { color: #AAAAAA; font-size: 0.78rem; align-self: center; }
    .meta-value { color: #444; font-size: 0.88rem; }
    .description-section { border-top: 1px solid #F0EEE8; padding-top: 20px; }
    .description-label { font-size: 0.78rem; color: #AAAAAA; margin-bottom: 8px; letter-spacing: 0.04em; }

</head>
